<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Date Journal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff4d61" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      const root = document.getElementById('root');

      if (location.protocol === 'file:') {
        document.body.style.margin = '0';
        document.body.style.fontFamily = 'system-ui, sans-serif';
        document.body.style.background = '#fdfbf7';
        document.body.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;padding:24px;color:#2d2727;">
            <section style="max-width:560px;background:#fff;border:1px solid #f4ece1;border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(230,216,196,.25);">
              <p style="margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#ff4d61;">Launch issue</p>
              <h1 style="margin:0 0 12px;font-size:32px;line-height:1.1;">Open this app with Vite, not by double-clicking <code>index.html</code>.</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#5f5656;">The app uses <code>/src/main.tsx</code>, so the browser needs Vite to transform the TypeScript and React code first.</p>
              <ol style="margin:0 0 20px;padding-left:20px;line-height:1.8;font-size:14px;color:#4c4444;">
                <li>Run <code>npm install</code> once.</li>
                <li>Run <code>npm run dev</code>.</li>
                <li>Open the local URL that Vite prints, usually <code>http://localhost:3000</code>.</li>
              </ol>
              <p style="margin:0;font-size:13px;color:#7a706e;">On Windows, double-click <code>run-app.bat</code> in this folder instead of opening <code>index.html</code>.</p>
            </section>
          </main>
        `;
      } else {
        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/src/main.tsx';
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
